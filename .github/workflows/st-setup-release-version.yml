  job-deploy-js_proto:
    runs-on: self-hosted
    steps:
      - name: Chown user
        run: |
          sudo chown -R $USER:$USER $GITHUB_WORKSPACE

      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Extract version from pom.xml
        id: pom_version
        run: |
          RAW_VERSION=$(grep -m1 "<version>" pom.xml | sed -E 's/.*<version>([^<]+)<\/version>.*/\1/')
          VERSION=${RAW_VERSION%-SNAPSHOT}
          NEW_TAG="v$VERSION"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Run the build process with Docker
        uses: addnab/docker-run-action@v3
        with:
          image: jaegertracing/protobuf:latest
          options: --rm -v ${{ github.workspace }}:/proto -w /proto
          run: |
            protoc --proto_path=proto/messages/ --js_out=import_style=commonjs,binary:./proto/out/js/proto $(find . -iname "*.proto") --experimental_allow_proto3_optional

      - name: Setup release version and check tag
        id: versionjs
        run: |
          cd ./proto/out/
          
          # Configure Git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Clone the target repository
          git clone git@github.com:SmartTAB/js-proto-entertainer.git target_repo_name
          
          pwd

          # Copy generated files to the target repository
          cp -rf ./js/* target_repo_name/
          
          # Get and increment the latest tag
          cd target_repo_name
          git fetch --tags

          # Read version from pom.xml file
          NEW_TAG="${{ steps.pom_version.outputs.new_tag }}"

          # Prevent duplicate tag
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
             echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Release a new js version
        if: steps.versionjs.outputs.tag_exists == 'false'
        run: |
          git add .
          git commit -m "Update JS proto files - ${{ steps.pom_version.outputs.new_tag }}"
          git tag -a "${{ steps.pom_version.outputs.new_tag }}" -m "Release ${{ steps.pom_version.outputs.new_tag }}"
          git push origin develop
          git push origin "${{ steps.pom_version.outputs.new_tag }}"

      - name: Tag already exists
        if: steps.versionjs.outputs.tag_exists == 'true'
        run: echo "Tag ${{ steps.pom_version.outputs.new_tag }} already exists — skipping release"


  job-package_component:
    needs: job-deploy-java_proto
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Chown user
        run: |
          sudo chown -R $USER:$USER $GITHUB_WORKSPACE

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 and Maven
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          overwrite-settings: false
          server-id: github # Value of the distributionManagement/repository/id field of the pom.xml

      - name: Build with Maven
        run: ./mvnw deploy
