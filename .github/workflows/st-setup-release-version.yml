# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package
run-name: Build release packages from ${{ github.ref_name }} by ${{ github.actor }} ✅

on:
  push:
    branches:
      - main
jobs:
  job-deploy-java_proto:
    runs-on: self-hosted
    steps:
      - name: Chown user
        run: |
          sudo chown -R $USER:$USER $GITHUB_WORKSPACE

      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Run the build process with Docker
        uses: addnab/docker-run-action@v3
        with:
          image: jaegertracing/protobuf:latest
          options: --rm -v ${{ github.workspace }}:/proto -w /proto
          run: |
            protoc --proto_path=proto/messages/ --java_out=./proto/out/java/src/main/java $(find . -iname "*.proto") --experimental_allow_proto3_optional

      - name: Publish package
        run: |
          cd ./proto/out/java
          ./mvnw deploy
