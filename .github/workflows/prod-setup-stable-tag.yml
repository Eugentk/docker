name: Production. Setup Stable Tag
run-name: Setup Stable release to ${{ inputs.ref }} by ${{ github.actor }} ✅

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git tag to point stable tag to'
        required: true
        type: string
      tag_message:
        description: 'Message for the stable tag (optional)'
        required: false
        type: string

permissions:
  contents: write
  actions: write

env:

  GIT_BRANCH: main
  TARGET_REF: "${{ inputs.ref }}"
  TAG_NAME: stable

  SYMFONY_GIT_REPOSITORY_URL: git@github.com:Eugentk/Actions.git
  SYMFONY_GIT_DEPLOY_KEY: ${{ secrets.SYMFONY_GIT_DEPLOY_KEY }}
  REACT_GIT_REPOSITORY_URL: git@github.com:Eugentk/deploy_example.git
  REACT_GIT_DEPLOY_KEY: ${{ secrets.REACT_GIT_DEPLOY_KEY }}
  GIT_ACCESS_TOKEN: ${{ secrets.GIT_ACCESS_TOKEN }}

jobs:
  move-stable-tag:
    name: Move stable tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout SAS repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create tag message
        run: |
          if [ -z "${{ inputs.tag_message }}" ]; then
            echo "TAG_MESSAGE=Stable release v.${{ inputs.ref }}" >> $GITHUB_ENV
          else
            echo "TAG_MESSAGE=${{ inputs.tag_message }}" >> $GITHUB_ENV
          fi

      - name: Move stable tag in SAS repo
        run: |
          git fetch --tags

          if ! git rev-parse "refs/tags/${TARGET_REF}" >/dev/null 2>&1; then
          echo "❌ ERROR: Tag '${TARGET_REF}' does not exist in SAS repository."
          echo "❌ Cannot move '${TAG_NAME}' tag."
          exit 1
          fi
          
          git tag -d "${TAG_NAME}" || true
          git push origin ":refs/tags/${TAG_NAME}" || true

          git tag -a "${TAG_NAME}" "${TARGET_REF}" -m "${TAG_MESSAGE}"
          git push origin "${TAG_NAME}"

      # ---------- Symfony ----------
      - name: Setup Symfony deploy key
        run: |
          echo "${{ env.SYMFONY_GIT_DEPLOY_KEY }}" > /tmp/symfony.pem
          chmod 600 /tmp/symfony.pem

      - name: Clone Symfony repo
        run: |
          GIT_SSH_COMMAND="ssh -i /tmp/symfony.pem -o StrictHostKeyChecking=no" git clone --depth 1 --branch ${{ env.GIT_BRANCH }} ${{ env.SYMFONY_GIT_REPOSITORY_URL }} /tmp/symfony
      
      - name: Configure SAS-Symfony Git user
        run: |
          cd /tmp/symfony
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Move stable tag in Symfony repo
        run: |
          cd /tmp/symfony
          git config core.sshCommand "ssh -i /tmp/symfony.pem -o StrictHostKeyChecking=no"
          git fetch --tags

          if ! git rev-parse "refs/tags/${TARGET_REF}" >/dev/null 2>&1; then
          echo "❌ ERROR: Tag '${TARGET_REF}' does not exist in SAS Symfony repository."
          echo "❌ Cannot move '${TAG_NAME}' tag."
          exit 1
          fi

          git tag -d "${TAG_NAME}" || true
          git push origin ":refs/tags/${TAG_NAME}" || true
          git tag -a "${TAG_NAME}" "${TARGET_REF}" -m "${TAG_MESSAGE}"
          git push origin "${TAG_NAME}"

      - name: Cleanup Symfony key
        run: rm -f /tmp/symfony.pem

      # ---------- React ----------
      - name: Setup React deploy key
        run: |
          echo "${{ env.REACT_GIT_DEPLOY_KEY }}" > /tmp/react.pem
          chmod 600 /tmp/react.pem

      - name: Clone React repo
        run: |
          GIT_SSH_COMMAND="ssh -i /tmp/react.pem -o StrictHostKeyChecking=no" git clone --depth 1 --branch ${{ env.GIT_BRANCH }} ${{ env.REACT_GIT_REPOSITORY_URL }} /tmp/react

      - name: Configure React Git user
        run: |
          cd /tmp/react
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Move stable tag in React repo
        run: |
          cd /tmp/react
          git config core.sshCommand "ssh -i /tmp/react.pem -o StrictHostKeyChecking=no"
          git fetch --tags
          
          if ! git rev-parse "refs/tags/${TARGET_REF}" >/dev/null 2>&1; then
          echo "❌ ERROR: Tag '${TARGET_REF}' does not exist in SAS Symfony repository."
          echo "❌ Cannot move '${TAG_NAME}' tag."
          exit 1
          fi

          git tag -d "${TAG_NAME}" || true
          git push origin ":refs/tags/${TAG_NAME}" || true
          git tag -a "${TAG_NAME}" "${TARGET_REF}" -m "${TAG_MESSAGE}"
          git push origin "${TAG_NAME}"

      - name: Cleanup React key
        run: rm -f /tmp/react.pem
