name: Production. ALB Maintenance Mode
run-name: Setup Maintenance Page by ${{ github.actor }} 🔥

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Enable or disable maintenance mode"
        required: true
        type: choice
        options:
          - enable
          - disable

      page_type:
        description: "Select maintenance page type"
        required: true
        type: choice
        options:
          - provider
          - maintenance

env:
  AWS_REGION: eu-west-2
  LISTENER_ARN: ${{ secrets.LISTENER_ARN }}
  SSM_PARAM: "/alb/previous-target-group"

jobs:
  maintenance_mode:
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Detect current Target Group
        if: ${{ github.event.inputs.action == 'enable' }}
        run: |
          CURRENT_TG=$(aws elbv2 describe-listeners \
            --listener-arn "$LISTENER_ARN" \
            --query "Listeners[0].DefaultActions[0].TargetGroupArn" \
            --output text)

          if [[ "$CURRENT_TG" == "None" || -z "$CURRENT_TG" ]]; then
            echo "❌ No active Target Group found (maybe already in maintenance)"
            exit 1
          fi

          echo "Detected TG: $CURRENT_TG"

          # Save to SSM
          aws ssm put-parameter \
            --name "$SSM_PARAM" \
            --value "$CURRENT_TG" \
            --type String \
            --overwrite

          echo "Saved previous TG to SSM"

      - name: Enable maintenance
        if: ${{ github.event.inputs.action == 'enable' }}
        run: |
         set -e

          if [[ "${{ github.event.inputs.page_type }}" == "provider" ]]; then
            echo "Using provider issue page..."

            HTML='<html><head><title>System Status</title></head><body style="font-family:Arial;text-align:center;padding-top:50px;background:#f5f5f5;"><div style="background:#fff;border-radius:12px;padding:40px;display:inline-block;"><h2 style="color:#e60023;">We are currently down</h2><p>We’re temporarily offline. One of our service providers is currently experiencing technical difficulties, which is affecting SAS.</p><p>We are monitoring the situation closely and will be back online as soon as they resolve the issue.</p><p style="text-align:center;"><b>Thanks for your patience!</b></p></div></body></html>'
          elif [[ "${{ github.event.inputs.page_type }}" == "maintenance" ]]; then
            echo "Using scheduled maintenance page..."

            HTML='<html><head><title>Service Maintenance</title></head><body style="font-family:Arial;text-align:center;padding-top:50px;background:#f5f5f5;"><div style="background:#fff;border-radius:12px;padding:40px;display:inline-block;max-width:500px;"><h2 style="color:#e60023;">Scheduled Maintenance</h2><p>Sorry for the inconvenience! We’re currently undergoing scheduled maintenance to improve your experience.</p><p>We’ll be back online shortly.</p><p style="margin-top:20px;"><b>Thank you for your patience!</b></p><p style="margin-top:30px;text-align:right;">Sincerely,<br>SellerAmp SAS Team</p></div></body></html>'

          else
            echo "Invalid page_type"
          exit 1
          fi

          aws elbv2 modify-listener \
          --listener-arn "$LISTENER_ARN" \
          --default-actions "Type=fixed-response,FixedResponseConfig={StatusCode=503,ContentType=text/html,MessageBody='$HTML'}"

          echo "✅ Maintenance ENABLED with ${{ github.event.inputs.page_type }} page"

      - name: Disable maintenance
        if: ${{ github.event.inputs.action == 'disable' }}
        run: |
          echo "Restoring previous Target Group..."

          PREVIOUS_TG=$(aws ssm get-parameter \
            --name "$SSM_PARAM" \
            --query "Parameter.Value" \
            --output text)

          if [[ -z "$PREVIOUS_TG" || "$PREVIOUS_TG" == "None" ]]; then
            echo "❌ Failed to retrieve previous TG from SSM"
            exit 1
          fi

          echo "Restoring to: $PREVIOUS_TG"

          aws elbv2 modify-listener \
            --listener-arn "$LISTENER_ARN" \
            --default-actions "Type=forward,TargetGroupArn=$PREVIOUS_TG"

          echo "✅ Maintenance DISABLED"
